services:
  website:
    build: .
    container_name: gamelib_web
    ports:
      - "15525:80"
    volumes:
      - .:/var/www/html
      - media_data:/var/www/html/img
    depends_on:
      - database

  database:
    image: mysql:8.0
    platform: linux/amd64
    container_name: gamelib_database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: game_library
    volumes:
      - database_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    container_name: gamelib_phpmyadmin
    restart: always
    ports:
      - "18080:80"
    environment:
      PMA_HOST: database
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - database

volumes:
  database_data:
  media_data: